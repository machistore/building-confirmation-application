# ============================================================
# 第四面: 階別床面積（繰り返し）
# ============================================================
# E54=（  H54=階）→ 階名は F54（col=5）
# I54=（  N54=）  → 申請部分床面積は J54（col=9）
# 2階目以降は1行ずつ下にずれる

floors:
  sheet: "第四面"
  sheet_idx: 3
  start_row: 53   # 0-based（row 54 = 1階目）
  階_col: 5       # F列（E54=（  H54=階）の間）
  床面積_col: 9   # J列（I54=（  N54=）の申請部分先頭）
  note: "第四面【１２．床面積】イ．階別（F54/J54から1行ずつ）"
